name: API

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - "turbo.json"
      - ".github/workflows/api.yml"
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: api-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Biome
        uses: biomejs/setup-biome@v2

      - name: Run Biome CI
        run: biome ci apps/api

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test
        working-directory: apps/api

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build API
        run: bun run build:all
        working-directory: apps/api

      - name: Upload API
        uses: actions/upload-artifact@v6
        with:
          name: api-${{ github.sha }}
          path: apps/api/dist/
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image archive
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          tags: atlas-api:${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/api-image.tar

      - name: Compress image archive
        run: gzip -9 "${{ runner.temp }}/api-image.tar"

      - name: Upload image archive
        uses: actions/upload-artifact@v6
        with:
          name: api-image-${{ github.sha }}
          path: ${{ runner.temp }}/api-image.tar.gz
          if-no-files-found: error
          retention-days: 14

      - name: Set container image name
        if: github.event_name == 'push'
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}-api:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish latest image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.name }}
