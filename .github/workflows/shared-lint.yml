name: Shared TypeScript config

on:
  pull_request:
    branches:
      - main
    paths:
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "biome.json"
      - "turbo.json"
      - ".github/workflows/shared-lint.yml"

permissions:
  contents: read

concurrency:
  group: shared-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Biome
        uses: biomejs/setup-biome@v2

      - name: Run Biome CI
        run: biome ci package.json biome.json turbo.json packages
